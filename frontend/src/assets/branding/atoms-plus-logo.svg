<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Amber/Gold gradient matching Atoms Plus theme -->
    <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a855"/>
      <stop offset="50%" style="stop-color:#c99a45"/>
      <stop offset="100%" style="stop-color:#b08a3a"/>
    </linearGradient>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a855;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e4c078;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer orbit ring 1 (tilted ellipse) -->
  <ellipse 
    cx="24" cy="24" rx="18" ry="8" 
    stroke="url(#orbitGradient)" 
    stroke-width="1.5" 
    fill="none"
    transform="rotate(-30 24 24)"
    opacity="0.7"
  />
  
  <!-- Outer orbit ring 2 (tilted ellipse) -->
  <ellipse 
    cx="24" cy="24" rx="18" ry="8" 
    stroke="url(#orbitGradient)" 
    stroke-width="1.5" 
    fill="none"
    transform="rotate(30 24 24)"
    opacity="0.7"
  />
  
  <!-- Outer orbit ring 3 (horizontal) -->
  <ellipse 
    cx="24" cy="24" rx="18" ry="8" 
    stroke="url(#orbitGradient)" 
    stroke-width="1.5" 
    fill="none"
    transform="rotate(90 24 24)"
    opacity="0.7"
  />
  
  <!-- Central nucleus (atom core) -->
  <circle 
    cx="24" cy="24" r="7" 
    fill="url(#atomGradient)"
    filter="url(#glow)"
  />
  
  <!-- Plus symbol in the center -->
  <g fill="white">
    <rect x="22.5" y="20" width="3" height="8" rx="1"/>
    <rect x="20" y="22.5" width="8" height="3" rx="1"/>
  </g>
  
  <!-- Orbiting electrons -->
  <circle cx="6" cy="24" r="2.5" fill="url(#atomGradient)" filter="url(#glow)"/>
  <circle cx="42" cy="24" r="2.5" fill="url(#atomGradient)" filter="url(#glow)"/>
  <circle cx="24" cy="6" r="2.5" fill="url(#atomGradient)" filter="url(#glow)"/>
</svg>

