# Railway 配置 - Atoms Plus Server
# 使用扩展的 Atoms Plus server 而不是默认的 OpenHands server
# 这样可以启用 multiagent、race mode 等扩展功能

[build]
builder = "NIXPACKS"
# 安装 Node.js 22 LTS 用于沙盒内的前端开发命令 (npm, npx, etc.)
nixpacksConfigPath = "nixpacks.toml"

[deploy]
# 使用 Atoms Plus Server 入口点
# 包含: /api/v1/race/*, /api/v1/orchestrator/*, /api/v1/roles/*
startCommand = "sh -c 'uvicorn atoms_plus.atoms_server:app --host 0.0.0.0 --port ${PORT:-8080}'"
healthcheckPath = "/atoms-plus/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

