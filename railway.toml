# Railway 配置 - Atoms Plus Server
# 使用扩展的 Atoms Plus server 而不是默认的 OpenHands server
# 这样可以启用 multiagent、race mode 等扩展功能

[build]
# 使用 Dockerfile 构建以确保完整的依赖安装
builder = "DOCKERFILE"
dockerfilePath = "containers/app/Dockerfile"

[deploy]
healthcheckPath = "/atoms-plus/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

